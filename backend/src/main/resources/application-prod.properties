spring.application.name=backend

# =============================
# PRODUCTION DATABASE (PostgreSQL)
# =============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================
# JPA / HIBERNATE (Production-safe)
# =============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================
# CONNECTION POOLING (HikariCP)
# =============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# =============================
# ADVANCED HIKARICP SETTINGS
# =============================
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.data-source-properties.prepareThreshold=3
spring.datasource.hikari.data-source-properties.prepareCacheSize=25
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# =============================
# FLYWAY MIGRATION (Disabled)
# =============================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# =============================
# LOGGING (Less verbose)
# =============================
logging.level.org.springframework.web=ERROR
logging.level.org.hibernate=ERROR
logging.level.com.reviewsaver=INFO

# =============================
# SERVER & ERROR HANDLING
# =============================
server.error.include-message=never
server.error.include-stacktrace=never